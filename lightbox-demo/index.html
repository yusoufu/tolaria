<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightbox Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
    min-height: 100vh;
  }
  .editor-pane {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    width: 720px;
    padding: 32px 40px;
  }
  .breadcrumb {
    font-size: 12px;
    color: #888;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 16px; color: #f0f0f0; }
  p { font-size: 15px; color: #aaa; line-height: 1.7; margin-bottom: 20px; }
  .inline-img {
    display: block;
    width: 100%;
    border-radius: 6px;
    cursor: zoom-in;
    transition: opacity 0.15s;
  }
  .inline-img:hover { opacity: 0.9; }
  .hint {
    font-size: 12px;
    color: #666;
    text-align: center;
    margin-top: 10px;
  }

  /* Lightbox overlay */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 24px;
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    font-size: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
</style>
</head>
<body>

<div class="editor-pane">
  <div class="breadcrumb">📁 Workspace / thumbnails &nbsp;›&nbsp; yusoufu-ai-thumbnail</div>
  <h1>AI Thumbnail Draft</h1>
  <p>First pass at the hero thumbnail for the upcoming video. Double-click the image to open full-screen lightbox.</p>

  <img
    class="inline-img"
    id="demo-img"
    src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80"
    alt="mountain landscape"
  />
  <p class="hint">↑ double-click to open lightbox (Esc or click backdrop to close)</p>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="close-btn">✕</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
  const img = document.getElementById('demo-img')
  const lightbox = document.getElementById('lightbox')
  const lbImg = document.getElementById('lightbox-img')
  const closeBtn = document.getElementById('close-btn')

  img.addEventListener('dblclick', () => {
    lbImg.src = img.src
    lightbox.classList.add('open')
  })
  closeBtn.addEventListener('click', () => lightbox.classList.remove('open'))
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) lightbox.classList.remove('open')
  })
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') lightbox.classList.remove('open')
  })
</script>
</body>
</html>
